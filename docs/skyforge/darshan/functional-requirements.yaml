# Functional requirements - Darshan
# Round 2: detail increased per Sky-Forge recommendations; library depth layers
# and becoming-path requirements added. Narrative sources:
# docs/darshan_interface_spec.md, docs/darshan_library_design.md,
# docs/darshan_becoming_path.md.
requirements:
  # ---------- entry and hub ----------
  - id: RF-001
    title: Threshold entry ritual
    description: One-breath contemplative entry absorbing all loading; hour-aware atmosphere.
    source: darshan_interface_spec.md 3.1
    priority: must
    mvp: true
    ai_suggested: false
    user_confirmed: true
    acceptance_criteria:
      - breath cue completes in ~8s (motion.breath_cycle token) and absorbs backend warm-up
      - single tap skips; settings offer permanent direct entry
      - reduced-motion renders static glyph variant
      - no spinner appears anywhere in the application
  - id: RF-002
    title: Court hub with one gesture per card
    description: Single calm hub, max one navigation level, explicit closing gesture.
    source: darshan_interface_spec.md 2
    priority: must
    mvp: true
    ai_suggested: false
    user_confirmed: true
    acceptance_criteria:
      - every surface reachable in one step from the Court
      - closing gesture visible on every surface; ends session with farewell line, no re-engagement hook
      - hour-aware emphasis reorders cards (dawn favors Word, dusk favors look-back) without hiding any

  # ---------- daily word ----------
  - id: RF-003
    title: Darshan of the Word (daily passage)
    description: One curated passage per day, typographically honored, cited, optional commentary.
    source: darshan_interface_spec.md 3.2
    priority: must
    mvp: true
    ai_suggested: false
    user_confirmed: true
    acceptance_criteria:
      - exactly one passage per local calendar day, prefetched for offline
      - passage renders at D0 with full depth dial available (RF-016)
      - curation policy respects season/festival, active living map, tradition rotation
      - no "next" affordance; archive list exists only behind settings, off by default
      - screen reader receives full text before reveal animation completes

  # ---------- inquiry ----------
  - id: RF-004
    title: Inquiry oracle with contemplation pages
    description: Single-question flow producing one composed, cited page; well rhythm between questions.
    source: darshan_interface_spec.md 3.3
    priority: must
    mvp: true
    ai_suggested: false
    user_confirmed: true
    acceptance_criteria:
      - composition screen contains one field and nothing else; no streaming during composition
      - at most one clarifying reflection, only on ambiguous state detection
      - answer delivered as one page (no chat bubbles), quotations open the depth dial at D2
      - after delivery, three exits offered (sit / keep / leave); follow-up field reappears after one breath interval
      - kept pages form the contemplation shelf, rereadable offline
  - id: RF-005
    title: Response contract enforcement
    description: State detection, guidance mode, mandatory resolvable citations, difference blocks, one movement max.
    source: darshan_interface_spec.md 4
    priority: must
    mvp: true
    ai_suggested: false
    user_confirmed: true
    acceptance_criteria:
      - every source claim carries a citation resolving into the Library (integrity 1.0 in CI)
      - traditions that differ produce an explicit differences block, never an average
      - at most one offered movement per page, labeled optional
      - contract checker regenerates or degrades to honest non-answer on validation failure
  - id: RF-006
    title: Honored silence and crisis protocol
    description: Restraint cases route to cautionary or silence modes with grounding and human support.
    source: consciousness_core/silence_and_non_answering.md
    priority: must
    mvp: true
    ai_suggested: false
    user_confirmed: true
    acceptance_criteria:
      - restraint-case detection short-circuits before retrieval
      - honored-silence page renders acknowledgment + one grounding pointer + Silence Room offer
      - crisis cases name qualified human support plainly; region-appropriate resources where configured
      - eval suite scores honored-silence precision as a success metric

  # ---------- library: depth layers ----------
  - id: RF-016
    title: Depth dial (the seven depths)
    description: One continuous gesture moves any passage through D0-D6 without losing position.
    source: darshan_library_design.md 2
    priority: must
    mvp: true
    ai_suggested: false
    user_confirmed: true
    acceptance_criteria:
      - from any quotation anywhere (word, inquiry, map, portal) the dial opens at D2
      - all seven depths reachable; current depth always named; keyboard accessible
      - position preserved independently at every depth when moving between them
      - depths render only real corpus content; D6 parallels marked when machine-suggested and unreviewed
  - id: RF-017
    title: No-orphan-quotation guarantee
    description: Every line shown can be followed in unbroken steps to its complete work.
    source: darshan_library_design.md 1
    priority: must
    mvp: true
    ai_suggested: false
    user_confirmed: true
    acceptance_criteria:
      - passage ids are stable across corpus rebuilds
      - D4 for restricted works renders the metadata record and links to the official source
      - CI check fails the build if any renderable quotation lacks a resolvable passage id
  - id: RF-018
    title: D1 plain-meaning layer as reviewed content
    description: Batch-drafted plain renderings, editorially reviewed, served as static content.
    source: darshan_library_design.md 2, 6
    priority: must
    mvp: true
    ai_suggested: false
    user_confirmed: true
    acceptance_criteria:
      - D1 texts versioned in the corpus, not generated at request time
      - unreviewed drafts visibly marked "machine-drafted, pending review"
      - written under voice rules; each cites its passage
  - id: RF-019
    title: Original language layer (D5)
    description: Devanagari, Tamil and French originals with IAST transliteration and word senses where available.
    source: darshan_library_design.md 2
    priority: should
    mvp: false
    ai_suggested: false
    user_confirmed: true
    acceptance_criteria:
      - original and transliteration render side by side with correct fonts (Noto Serif Devanagari/Tamil, Gentium Plus)
      - verse-level alignment tables map translation passages to original passages
      - word-by-word glosses shown where corpus provides them; absence stated plainly, never fabricated
  - id: RF-020
    title: Constellation layer (D6)
    description: Parallels, named differences, ontology concepts and practices around a passage.
    source: darshan_library_design.md 2, 6
    priority: should
    mvp: false
    ai_suggested: false
    user_confirmed: true
    acceptance_criteria:
      - every parallel is a real passage with provenance, never paraphrase
      - difference blocks name positions per tradition
      - editorially confirmed parallels unmarked; retrieval-suggested ones marked as machine-suggested
      - concepts link into ontology lens (RF-011); practices link into Practice Field

  # ---------- library: classification and consultation ----------
  - id: RF-021
    title: Facet classification browser (door Browse)
    description: Seven facets from repository data; contemplative browsing, max two active facets.
    source: darshan_library_design.md 3, 4
    priority: must
    mvp: true
    ai_suggested: false
    user_confirmed: true
    acceptance_criteria:
      - facets derive from frontmatter/ontology data, no hand-maintained duplicates
      - at most two facets combinable in the UI
      - results render as calm entries with tradition and work named; no infinite grid
      - depth_readiness shapes ordering and introductions, never blocks access
  - id: RF-022
    title: Situation portal (door Situate)
    description: Life-moment doors (grief, fear, work, love, decision, dryness, joy...) opening to curated passage plus micro-movement.
    source: darshan_becoming_path.md 4; darshan_library_design.md 4
    priority: must
    mvp: true
    ai_suggested: false
    user_confirmed: true
    acceptance_criteria:
      - each door opens one curated D0/D1 passage, one optional micro-movement, and the constellation
      - restraint-category doors follow the crisis protocol (fewer words, grounding, human support)
      - doors named in human words; includes at least one door for joy/gratitude
      - arriving through a door sets state context for any subsequent Inquiry
  - id: RF-023
    title: Corpus search (all doors)
    description: Exact search offline over local corpus; semantic search online; both facet-filterable.
    source: darshan_library_design.md 4
    priority: must
    mvp: true
    ai_suggested: false
    user_confirmed: true
    acceptance_criteria:
      - exact search works offline over downloaded bundles
      - every result is a passage with provenance opening the depth dial; never a homeless snippet
      - semantic search states its need for connection plainly

  # ---------- library: reading rooms ----------
  - id: RF-007
    title: Reading rooms with provenance (D3/D4)
    description: Offline long-form reading of complete works; shelf, room, margin, provenance page.
    source: darshan_library_design.md 5
    priority: must
    mvp: true
    ai_suggested: false
    user_confirmed: true
    acceptance_criteria:
      - shelf presents each collection with a one-paragraph introduction of its spirit
      - each room has table of contents, provenance page (edition, copyright status, corpus entry path)
      - reading position remembered per work indefinitely; offline after first visit
      - first entry to a work offers its D1 introduction once, then leaves the seeker with the text
      - reading measure respects margin_inline_max_ch token; hour themes apply
  - id: RF-011
    title: Concept lens in the margin
    description: Marked terms open tradition-by-tradition senses without leaving the page.
    source: darshan_library_design.md 5
    priority: should
    mvp: false
    ai_suggested: false
    user_confirmed: true
    acceptance_criteria:
      - lens opens in margin/panel, reading position untouched
      - senses grouped by tradition with named differences; sources cited
      - keyboard and screen-reader accessible
  - id: RF-014
    title: Comparative reading view
    description: Two passages side by side with cited comparison naming differences explicitly.
    source: darshan_library_design.md 2 (D6)
    priority: could
    mvp: false
    ai_suggested: true
    user_confirmed: true
    acceptance_criteria:
      - both passages keep full provenance and dial access
      - comparison text follows comparative_philosophy guidance mode
  - id: RF-024
    title: Personal anthology
    description: Kept passages and margin notes assemble into the seeker's own book, exportable.
    source: darshan_library_design.md 5
    priority: should
    mvp: false
    ai_suggested: false
    user_confirmed: true
    acceptance_criteria:
      - anthology organizable by the seeker's own labels
      - export produces plain Markdown with citations intact
      - stored with diary-grade privacy (local-first, never indexed)

  # ---------- becoming path ----------
  - id: RF-025
    title: Postures of the seeker (self-declared)
    description: Four self-declared postures shaping tone, default depth and emphasis; changeable any day.
    source: darshan_becoming_path.md 2
    priority: should
    mvp: true
    ai_suggested: false
    user_confirmed: true
    acceptance_criteria:
      - posture selection optional, in the seeker's own words, changeable in one step
      - posture changes emphasis and defaults only; never gates content or features
      - no rank, level, badge or progress framing anywhere
  - id: RF-026
    title: Rhythm composer (the day as ashram)
    description: Seeker weaves dawn word, offering, midday remembrance, dusk look-back, night silence into their own day.
    source: darshan_becoming_path.md 3
    priority: should
    mvp: false
    ai_suggested: false
    user_confirmed: true
    acceptance_criteria:
      - every joint independently on/off and time-movable (night workers can invert the arc)
      - whole default arc under ten minutes of screen time daily
      - absence accumulates zero debt; return after any gap greeted with warmth, no counters
  - id: RF-009
    title: Living Maps walker
    description: Station-based journeys from ontology living maps; manual advance; dignified regression.
    source: darshan_interface_spec.md 3.4
    priority: should
    mvp: false
    ai_suggested: false
    user_confirmed: true
    acceptance_criteria:
      - stations render teaching (cited, dial-enabled), reflection, one offered movement
      - no progress percentages; "stay here some days" is a first-class suggestion
      - moving backwards carries no loss framing
  - id: RF-027
    title: Reading journeys (study as sadhana)
    description: Editorially curated sequences (First Contact, Foundation, Deepening) that end where books begin.
    source: darshan_becoming_path.md 5
    priority: could
    mvp: false
    ai_suggested: false
    user_confirmed: true
    acceptance_criteria:
      - journeys are suggested orders, not courses; no enrollment, completion or quiz mechanics
      - each journey terminates by opening the relevant reading room
      - resumable and abandonable without any guilt surface
  - id: RF-010
    title: Practice Field
    description: Silence timer, morning offering, evening look-back, japa support; no statistics.
    source: darshan_interface_spec.md 3.5
    priority: should
    mvp: false
    ai_suggested: false
    user_confirmed: true
    acceptance_criteria:
      - silence timer ends with single bell and "received", no stats
      - look-back stores three answers to the diary only
      - japa mode works with screen off, haptic-only
  - id: RF-028
    title: Season letter (opt-in)
    description: Quarterly letter composed from the seeker's own kept passages, in the voice of a friend.
    source: darshan_becoming_path.md 6
    priority: could
    mvp: false
    ai_suggested: true
    user_confirmed: null
    acceptance_criteria:
      - uses kept passages and diary titles only; entry contents never read without witness invitation
      - no metrics, comparisons or year-in-review mechanics
      - one gesture disables it forever

  # ---------- diary, silence, system ----------
  - id: RF-012
    title: Inner Diary with witness mode
    description: Local-first encrypted journal; engine blind by default; single witness response per invitation.
    source: darshan_interface_spec.md 3.7
    priority: should
    mvp: false
    ai_suggested: false
    user_confirmed: true
    acceptance_criteria:
      - diary readable/writable fully offline; encrypted at rest with user-derived key
      - witness mode sends one invited entry transiently; server stores nothing
      - witness response reflects the seeker's words with at most one cited source resonance
  - id: RF-008
    title: Silence Room (mauna mode)
    description: Zero-telemetry near-black room with breath pulse, one gesture in and out, from every surface.
    source: darshan_interface_concept.md zeroth gesture
    priority: must
    mvp: true
    ai_suggested: false
    user_confirmed: true
    acceptance_criteria:
      - reachable from every surface with the same gesture
      - emits zero telemetry events while active
      - renders only --veil surface and --halo pulse at breath cycle
  - id: RF-013
    title: Opt-in dawn/dusk bells
    description: Up to two daily quiet notifications, one line, no content teasers, off by default.
    source: darshan_interface_spec.md 5
    priority: could
    mvp: false
    ai_suggested: true
    user_confirmed: true
    acceptance_criteria:
      - hard maximum of two bells daily; each carries a single line
      - never contains teaser, streak, or re-engagement copy
  - id: RF-015
    title: Presence metrics pipeline
    description: Closure rate, rhythm steadiness, depth ratio, movement adoption, honored-silence precision, citation integrity.
    source: darshan_interface_spec.md 6
    priority: must
    mvp: true
    ai_suggested: false
    user_confirmed: true
    acceptance_criteria:
      - engagement metrics (session length, DAU curves, questions/user) absent from all dashboards
      - metrics computed on-device or aggregated without user-level profiles
      - citation integrity gate blocks release below 1.0
  - id: RF-029
    title: Offline corpus bundles with versioning
    description: Reading rooms, daily words and exact search ship as versioned static bundles.
    source: c4-model.md ADR 5; darshan_library_design.md 6
    priority: must
    mvp: true
    ai_suggested: false
    user_confirmed: true
    acceptance_criteria:
      - bundles built at index time with copyright filter applied
      - passage ids stable across bundle versions; updates never lose positions, anthologies or shelves
      - bundle size budget respected for low-bandwidth distribution (ELV-002)

  # ---------- sky map (gesture 8) ----------
  - id: RF-030
    title: Outer sky (rhythms of heaven)
    description: Sun, moon/tithi, six seasons and observances rendered as a drawn sky, computed on device.
    source: darshan_sky_map_design.md 2
    priority: should
    mvp: false
    ai_suggested: false
    user_confirmed: true
    acceptance_criteria:
      - ephemeris computed locally; no network call, location never transmitted
      - moon phase, tithi, sunrise/sunset/sandhyas, season (hemisphere-aware) accurate for device location or chosen city
      - every rhythm element opens the depth dial into cited corpus passages
      - observances render as invitations with sources; nothing is tracked as kept/missed
      - numbers appear only on request; default is the drawn sky
  - id: RF-031
    title: Anti-prophecy boundary of the Sky Map
    description: No natal charts, horoscopes, predictions or auspiciousness verdicts anywhere.
    source: darshan_sky_map_design.md 1
    priority: must
    mvp: false
    ai_suggested: false
    user_confirmed: true
    acceptance_criteria:
      - no feature computes or renders personal astrological interpretation
      - jyotisha corpus material renders only as documentary Library content (D2-D6, cited)
      - eval suite includes prompts attempting to extract predictions; contract must refuse
  - id: RF-032
    title: Inner sky (map of the five planes)
    description: Five weather bands (physical, energetic, emotional, mental, spiritual) marked by the seeker, mirrored by the app.
    source: darshan_sky_map_design.md 3
    priority: should
    mvp: false
    ai_suggested: false
    user_confirmed: true
    acceptance_criteria:
      - consultation completable in under a minute; any subset of bands may be marked
      - the app never pre-marks or infers a band; mirror renders only what the seeker marked
      - at most one offer (passage or safe movement) after mirroring, fitted through the ontology
      - restraint-grade weather (despair, illness) routes to the crisis protocol
      - no scoring, streaks, comparisons or "good sky" framing anywhere
  - id: RF-033
    title: Inner sky privacy and personal patterns
    description: Consultations stored diary-grade; seasonal patterns shown only to the seeker.
    source: darshan_sky_map_design.md 3
    priority: must
    mvp: false
    ai_suggested: false
    user_confirmed: true
    acceptance_criteria:
      - inner-sky data local-first, encrypted, never indexed or profiled (NFR-001 class)
      - engine sees a consultation only via explicit per-Inquiry attachment gesture
      - patterns view reflects the seeker's own marks; no diagnosis language in copy
  - id: RF-034
    title: Sky-bound rhythm composer
    description: Rhythm joints may bind to the real sky (dawn word at brahmamuhurta, look-back at sunset).
    source: darshan_sky_map_design.md 2; darshan_becoming_path.md 3
    priority: could
    mvp: false
    ai_suggested: true
    user_confirmed: true
    acceptance_criteria:
      - each joint independently bindable to clock time or sky time
      - sky-bound bells still respect the two-bell maximum and no-teaser rule

  # ---------- house of nature (gesture 9) ----------
  - id: RF-035
    title: House of Nature rooms
    description: Elements, Land, Body as Temple, Long Life and Healing Memory rooms over the cited corpus.
    source: darshan_nature_health_design.md 2
    priority: should
    mvp: false
    ai_suggested: false
    user_confirmed: true
    acceptance_criteria:
      - every room renders only cited corpus content through the depth dial
      - pancha mahabhuta taxonomy added to content/ontology and exposed as a Library facet
      - rooms render in open / arriving / future states matching actual corpus availability
      - Sky Map seasons link into regimen wisdom at safe tier only
  - id: RF-036
    title: Heritage notice and three-tier health content enforcement
    description: Permanent heritage notice; safe / documentary / closed tiers enforced by content tagging.
    source: darshan_nature_health_design.md 1
    priority: must
    mvp: false
    ai_suggested: false
    user_confirmed: true
    acceptance_criteria:
      - heritage notice permanently visible on every House surface (not a dismissable modal)
      - only safe-tier content is ever offered as a movement anywhere in the app
      - documentary tier renders with the standing under-qualified-guidance mark
      - closed tier (dosages, disease-specific treatment, anti-medical counsel) never renders as guidance; routes to crisis protocol
      - untagged health-touching content defaults to documentary rendering with the fence
  - id: RF-037
    title: Double editorial gate for health-sensitive corpus
    description: Editorial + safety review required before health content renders above D2.
    source: darshan_nature_health_design.md 5
    priority: must
    mvp: false
    ai_suggested: false
    user_confirmed: true
    acceptance_criteria:
      - import manifests can flag collections health_sensitive; the flag forces the gate
      - safety review logged in frontmatter (reviewer, date, tier decisions)
      - CI blocks rendering-tier promotion of unreviewed health-sensitive passages

  # ---------- living corpus ----------
  - id: RF-038
    title: Living corpus growth protocol
    description: The app evolves as parallel import agents land new collections; features light up honestly.
    source: darshan_nature_health_design.md 6; darshan_library_design.md 6
    priority: should
    mvp: true
    ai_suggested: false
    user_confirmed: true
    acceptance_criteria:
      - new collections enter via the existing manifest pattern (scripts/ingest/manifests) with facet and copyright declarations
      - shelf, facets, constellation and rooms extend automatically from corpus data on bundle update
      - corpus-gated surfaces show open / arriving / future truthfully; no page pretends to content that does not exist
      - a quiet, dismissable "the library has grown" line may appear at the Court on bundle update; never a badge or campaign
