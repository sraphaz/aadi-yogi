<!-- @dsCard group="Components" viewport="700x230" subtitle="warm nouns, lowercase, max two columns — includes a door for joy" name="Situation doors" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"></head>
<body style="margin:0;background:var(--surface);padding:26px 32px;font-family:var(--font-body);">
<div style="font-size:11px;letter-spacing:var(--tracking-label);text-transform:uppercase;color:var(--ink-soft);margin-bottom:14px;">arrive with your life</div>
<div style="display:grid;grid-template-columns:repeat(2,180px);gap:10px;">
  <div style="border:1px solid color-mix(in srgb, var(--ink) 14%, transparent);border-radius:var(--radius-pill);padding:11px 20px;font-size:0.95rem;color:var(--ink);background:var(--surface-raised);cursor:pointer;">grief</div>
  <div style="border:1px solid color-mix(in srgb, var(--ink) 14%, transparent);border-radius:var(--radius-pill);padding:11px 20px;font-size:0.95rem;color:var(--ink);background:var(--surface-raised);cursor:pointer;">work</div>
  <div style="border:1px solid color-mix(in srgb, var(--ink) 14%, transparent);border-radius:var(--radius-pill);padding:11px 20px;font-size:0.95rem;color:var(--ink);background:var(--surface-raised);cursor:pointer;">a decision</div>
  <div style="border:1px solid color-mix(in srgb, var(--ink) 14%, transparent);border-radius:var(--radius-pill);padding:11px 20px;font-size:0.95rem;color:var(--ink);background:var(--surface-raised);cursor:pointer;">joy</div>
  <div style="border:1px solid color-mix(in srgb, var(--warn) 55%, transparent);border-radius:var(--radius-pill);padding:11px 20px;font-size:0.95rem;color:var(--ink);background:var(--surface-raised);cursor:pointer;">illness</div>
  <div style="border:1px solid color-mix(in srgb, var(--ink) 14%, transparent);border-radius:var(--radius-pill);padding:11px 20px;font-size:0.95rem;color:var(--ink);background:var(--surface-raised);cursor:pointer;">practice is dry</div>
</div>
<div style="font-size:11px;color:var(--ink-soft);margin-top:14px;">no icons of despair · restraint doors (illness, despair) carry a quiet --warn border and follow the crisis protocol</div>
</body></html>
