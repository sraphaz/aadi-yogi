<!-- @dsCard group="Colors" viewport="700x170" subtitle="near-silence — almost black, one warm point" name="Theme · night" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"></head>
<body data-hour="night" style="margin:0;background:var(--surface);font-family:var(--font-mono);padding:20px 22px;">
<div style="display:grid;grid-template-columns:repeat(9,1fr);gap:8px;">
  <div><div style="height:58px;border-radius:8px;background:var(--surface);border:1px solid rgba(128,125,138,.25);"></div><div style="font-size:10px;color:var(--ink-soft);margin-top:6px;">--surface</div></div>
  <div><div style="height:58px;border-radius:8px;background:var(--surface-raised);"></div><div style="font-size:10px;color:var(--ink-soft);margin-top:6px;">--surface-raised</div></div>
  <div><div style="height:58px;border-radius:8px;background:var(--ink);"></div><div style="font-size:10px;color:var(--ink-soft);margin-top:6px;">--ink</div></div>
  <div><div style="height:58px;border-radius:8px;background:var(--ink-soft);"></div><div style="font-size:10px;color:var(--ink-soft);margin-top:6px;">--ink-soft</div></div>
  <div><div style="height:58px;border-radius:8px;background:var(--accent-flame);"></div><div style="font-size:10px;color:var(--ink-soft);margin-top:6px;">--accent-flame</div></div>
  <div><div style="height:58px;border-radius:8px;background:var(--accent-gold);"></div><div style="font-size:10px;color:var(--ink-soft);margin-top:6px;">--accent-gold</div></div>
  <div><div style="height:58px;border-radius:8px;background:var(--halo);"></div><div style="font-size:10px;color:var(--ink-soft);margin-top:6px;">--halo</div></div>
  <div><div style="height:58px;border-radius:8px;background:var(--veil);"></div><div style="font-size:10px;color:var(--ink-soft);margin-top:6px;">--veil</div></div>
  <div><div style="height:58px;border-radius:8px;background:var(--warn);"></div><div style="font-size:10px;color:var(--ink-soft);margin-top:6px;">--warn</div></div>
</div>
</body></html>
