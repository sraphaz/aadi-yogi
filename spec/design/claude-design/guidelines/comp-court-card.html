<!-- @dsCard group="Components" viewport="700x210" subtitle="one gesture per card — hairline border, no shadow, nothing moves on hover" name="Court card" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"></head>
<body data-hour="dusk" style="margin:0;background:var(--surface);padding:26px 32px;font-family:var(--font-body);">
<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;max-width:520px;">
  <div style="background:var(--surface-raised);border:1px solid color-mix(in srgb, var(--ink) 12%, transparent);border-radius:var(--radius-soft);padding:18px 18px 16px;min-height:var(--touch-target);cursor:pointer;">
    <div style="font-family:var(--font-passage);font-size:1.05rem;color:var(--ink);">the word</div>
    <div style="font-size:12px;color:var(--ink-soft);margin-top:5px;">one passage for this day</div>
  </div>
  <div style="background:var(--surface-raised);border:1px solid color-mix(in srgb, var(--ink) 12%, transparent);border-radius:var(--radius-soft);padding:18px 18px 16px;cursor:pointer;">
    <div style="font-family:var(--font-passage);font-size:1.05rem;color:var(--ink);">the inquiry</div>
    <div style="font-size:12px;color:var(--ink-soft);margin-top:5px;">bring one real question</div>
  </div>
</div>
<div style="font-size:11px;color:var(--ink-soft);margin-top:16px;">hover: ink shifts at 150ms, border warms to --accent-gold at 30% — no lift, no scale · dawn reorders toward the word, dusk toward the look-back</div>
</body></html>
