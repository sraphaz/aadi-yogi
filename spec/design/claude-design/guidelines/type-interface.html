<!-- @dsCard group="Type" viewport="700x230" subtitle="Manrope — the interface whispers; labels are small caps, letterspaced" name="Interface type" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"></head>
<body style="margin:0;background:var(--surface);padding:30px 40px;font-family:var(--font-body);color:var(--ink);">
<div style="font-size:11px;letter-spacing:var(--tracking-label);text-transform:uppercase;color:var(--ink-soft);">the court</div>
<div style="font-size:var(--type-body);line-height:var(--leading-body);margin-top:14px;max-width:52ch;">Body text at 1rem, weight 400. Everything is offered, never assigned; sentences end quietly, without urgency and without exclamation.</div>
<div style="font-size:var(--type-meta);color:var(--ink-soft);margin-top:12px;">Meta and citations at 0.875rem in --ink-soft.</div>
<div style="display:flex;gap:24px;margin-top:22px;font-size:13px;">
  <span style="font-weight:400;">regular 400</span>
  <span style="font-weight:500;">medium 500</span>
  <span style="font-weight:600;">strong 600</span>
  <span style="color:var(--accent-flame);">link · --accent-flame</span>
  <span style="color:var(--ink-soft);">minimum 0.75rem — never below 12px</span>
</div>
</body></html>
