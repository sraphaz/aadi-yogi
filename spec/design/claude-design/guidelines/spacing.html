<!-- @dsCard group="Spacing" viewport="700x250" subtitle="space is doctrine — the breath around a word is part of the word" name="Spacing & measure" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"></head>
<body style="margin:0;background:var(--surface);padding:28px 40px;font-family:var(--font-body);color:var(--ink);">
<div style="display:grid;grid-template-columns:170px 1fr;gap:12px 18px;align-items:center;font-size:12px;">
  <div style="color:var(--ink-soft);">--space-breath · 4rem</div><div style="height:14px;width:64px;background:var(--accent-gold);opacity:.5;border-radius:3px;"></div>
  <div style="color:var(--ink-soft);">--space-stanza · 2rem</div><div style="height:14px;width:32px;background:var(--accent-gold);opacity:.5;border-radius:3px;"></div>
  <div style="color:var(--ink-soft);">--space-paragraph · 1.25rem</div><div style="height:14px;width:20px;background:var(--accent-gold);opacity:.5;border-radius:3px;"></div>
  <div style="color:var(--ink-soft);">--touch-target · 44px</div><div style="height:24px;width:44px;border:1px dashed var(--halo);border-radius:6px;"></div>
</div>
<div style="margin-top:20px;font-size:12px;color:var(--ink-soft);border-top:1px solid rgba(109,106,117,.2);padding-top:14px;max-width:var(--measure-reading);">
  --measure-reading caps every reading surface at 62ch. This line of quiet text sits inside that measure — long-form reading never stretches wider, whatever the screen offers.
</div>
</body></html>
