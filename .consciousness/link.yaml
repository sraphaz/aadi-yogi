# Adyog consciousness overlay — living foundation (not Darshan app rules).
version: 1
identity: aadi-yogi-consciousness-foundation
source:
  kind: git
  repo: https://github.com/sraphaz/aadi-yogi
  ref: main
  package_path: packages/consciousness
manifest:
  path: content/consciousness_core/approved_manifest.yaml
  pin: v1
install:
  carry: foundation
  primary_file: content/consciousness_core/foundation.md
  do_not_carry_as_identity:
    - darshan_response_envelope
    - darshan_restraint_router
sync_mode: living
capabilities:
  - load_foundation
  - consult
  - propose_feedback
  - discernment_lookup
notes:
  - Host agents receive a basis of conduct and reality-sense from the sources.
  - They do not become gurus; they do not perform mysticism in the host repo.
  - Learning returns through reviewed feedback, never silent self-authorization.
