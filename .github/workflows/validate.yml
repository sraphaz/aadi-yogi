name: Validate

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml pytest ruff fastapi pydantic uvicorn

      - name: Run tests
        run: PYTHONPATH=. pytest

      - name: Validate Markdown
        run: python scripts/validate/validate_markdown.py

      - name: Build vector index
        run: PYTHONPATH=. python scripts/index/build_vector_index.py

      - name: Golden question retrieval eval
        run: PYTHONPATH=. python scripts/validate/run_golden_questions.py
