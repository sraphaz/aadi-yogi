  - id: 43
    volume: "33-34"
    slug: volume_33_34_savitri
    title: Savitri - A Legend and a Symbol
    full_text: true
    poetry: true
    themes: [epic_poetry, transformation, death_and_immortality, savitri, aspiration]
    description: >-
