  - id: 70
    volume: "31"
    slug: volume_31_letters_on_yoga_iv
    title: Letters on Yoga - IV
    full_text: false
    themes: [letters, integral_yoga, sadhana, guidance]
    description: >-
      Letters on the integral yoga. Posthumously compiled; still under active
