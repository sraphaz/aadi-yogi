  - id: 42
    volume: "32"
    slug: volume_32_the_mother_with_letters_on_the_mother
    title: The Mother with Letters on the Mother
    full_text: false
    themes: [divine_mother, shakti, surrender, grace]
    description: >-
      Sri Aurobindo's book The Mother (1928, itself public domain) together
