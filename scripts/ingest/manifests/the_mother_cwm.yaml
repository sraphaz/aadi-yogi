# Manifest: Collected Works of the Mother (CWM).
# Source library: https://www.sriaurobindoashram.org/mother/writings.php
#
# The English Collected Works (17 volumes) are browsable online only; the
# downloadable PDFs offered by the Ashram are the French originals
# (https://www.sriaurobindoashram.org/mother/oeuvres.php, 18 volumes).
#
# The Mother passed in 1973, so her works remain under active copyright of the
# Sri Aurobindo Ashram Trust (in India until at least 2034). Following
# docs/copyright_policy.md, every volume here is full_text: false - only
# metadata records are committed to content/sources/. The download and
# conversion scripts still work end to end for personal local study: PDFs go
# to data/raw/ and converted Markdown goes to data/markdown/, both gitignored.
collection: the_mother_cwm
collection_title: Collected Works of the Mother
author: The Mother
publisher: Sri Aurobindo Ashram Publication Department, Pondicherry
source_page: https://www.sriaurobindoashram.org/mother/writings.php
download_url_template: "https://www.sriaurobindoashram.org/mother/downloadpdf.php?id={id}"
raw_dir: data/raw/the_mother_cwm
content_dir: content/sources/the_mother/collected_works
restricted_markdown_dir: data/markdown/the_mother_cwm
language: french
tradition:
  - integral_yoga
